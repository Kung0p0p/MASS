                        <div className="bg-emerald-50 p-5 md:p-6 rounded-2xl shadow-sm border border-emerald-200 flex items-center justify-between relative overflow-hidden">
                            <div className="relative z-10">
                                <p className="text-xs md:text-sm font-semibold text-emerald-600 mb-1">สำเร็จแล้วทั้งหมด</p>
                                <p className="text-4xl md:text-5xl font-bold text-emerald-700">{overall.done}</p>
                            </div>
                            <i className="fa-solid fa-circle-check text-6xl opacity-10 text-emerald-800 absolute right-4 top-1/2 -translate-y-1/2"></i>
                        </div>
                        <div className="bg-orange-50 p-5 md:p-6 rounded-2xl shadow-sm border border-orange-200 flex items-center justify-between relative overflow-hidden">
                            <div className="relative z-10">
                                <p className="text-xs md:text-sm font-semibold text-orange-600 mb-1">กำลังดำเนินการทั้งหมด</p>
                                <p className="text-4xl md:text-5xl font-bold text-orange-700">{overall.pending}</p>
                            </div>
                            <i className="fa-solid fa-clock-rotate-left text-6xl opacity-10 text-orange-800 absolute right-4 top-1/2 -translate-y-1/2"></i>
                        </div>
                    </div>

                    <div className="pt-4">
                        <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center"><i className="fa-solid fa-layer-group text-slate-400 mr-2"></i> แยกตามระบบงาน</h3>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <SystemCard title="Region Assignment" icon="fa-user-gear" colorClass="bg-blue-600" bgClass="bg-blue-50/30 border-blue-100" stats={s1} />
                            <SystemCard title="ควบคุมงานสำรวจ" icon="fa-map-location-dot" colorClass="bg-amber-500" bgClass="bg-amber-50/30 border-amber-100" stats={s2} />
                            <SystemCard title="ออเดอร์ Cross Connect" icon="fa-network-wired" colorClass="bg-emerald-600" bgClass="bg-emerald-50/30 border-emerald-100" stats={s3} />
                        </div>
                    </div>
                </div>
            );
        };

        const DashboardView = ({ systemMode, tasksSys1, masterData }) => {
            const [filterMonth, setFilterMonth] = useState('All');
            const [filterTeams, setFilterTeams] = useState([]);
            const [selectedStatuses, setSelectedStatuses] = useState([]);

            if (systemMode !== 'sys1') {
                return (
                    <div className={`bg-${systemMode==='sys2'?'amber':'emerald'}-50 p-10 rounded-2xl text-${systemMode==='sys2'?'amber':'emerald'}-700 font-bold border border-${systemMode==='sys2'?'amber':'emerald'}-200 text-center shadow-sm max-w-3xl mx-auto mt-10`}>
                        <i className={`fa-solid ${systemMode==='sys2'?'fa-chart-pie':'fa-chart-column'} text-6xl mb-4 block opacity-80`}></i>
                        <h3 className="text-2xl">ภาพรวม {systemMode==='sys2' ? 'ระบบงานสำรวจ' : 'ออเดอร์ Cross Connect'}</h3>
                        <p className="font-normal mt-2 opacity-80">ส่วนนี้ยังไม่มีกราฟแสดงผล เนื่องจากโครงสร้างข้อมูลยังไม่สมบูรณ์</p>
                    </div>
                );
            }

            const getStatusColorConfig = (statusName) => {
                const found = masterData.statuses.find(s => s.name === statusName);
                if (found) return { bg: hexToRgbA(found.bg, 0.8), border: found.bg, text: found.bg, soft: hexToRgbA(found.bg, 0.15) };
                return { bg: 'rgba(203, 213, 225, 0.8)', border: '#64748b', text: '#64748b', soft: '#f1f5f9' };
            };

            const uniqueMonths = [...new Set(tasksSys1.map(t => {
                const d = t.installDate ? new Date(t.installDate) : parseThaiDateTime(t.dateTime);
                return d ? d.getMonth() + 1 : null;
            }).filter(Boolean))].sort((a,b)=>a-b);

            const uniqueTeams = masterData.equipTeams;

            let filteredTasks = tasksSys1.filter(t => {
                let mMatch = true, tMatch = true;
                const d = t.installDate ? new Date(t.installDate) : parseThaiDateTime(t.dateTime);
                if (filterMonth !== 'All' && d && (d.getMonth() + 1) !== parseInt(filterMonth)) mMatch = false;
                if (filterTeams.length > 0) {
                    const taskTeams = Array.isArray(t.equipTeams) ? t.equipTeams : [];
                    if (!taskTeams.some(team => filterTeams.includes(team))) tMatch = false;
                }
                return mMatch && tMatch;
            });

            const chartFilteredTasks = filteredTasks.filter(t => selectedStatuses.length === 0 || selectedStatuses.includes(t.status));
            const totalTasksCount = filteredTasks.length;

            const statusCounts = {}; masterData.statuses.forEach(s => statusCounts[s.name] = 0);
            filteredTasks.forEach(t => { if(statusCounts[t.status] !== undefined) statusCounts[t.status]++; else statusCounts[t.status] = 1; });
            const sortedStatuses = Object.keys(statusCounts);

            const doughnutCounts = {}; chartFilteredTasks.forEach(t => { doughnutCounts[t.status] = (doughnutCounts[t.status] || 0) + 1; });
            const doughnutLabels = Object.keys(doughnutCounts);
            const statusChartData = { labels: doughnutLabels, datasets: [{ data: doughnutLabels.map(s => doughnutCounts[s]), backgroundColor: doughnutLabels.map(s => getStatusColorConfig(s).bg), borderColor: doughnutLabels.map(s => getStatusColorConfig(s).border), borderWidth: 2, hoverOffset: 6, borderRadius: 4 }] };
            const statusChartOptions = { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { display: false }, datalabels: { display: false } } };

            const monthlyData = {}; for (let i = 1; i <= 12; i++) monthlyData[i] = { done: 0, ongoing: 0 };
            chartFilteredTasks.forEach(t => {
                const d = t.installDate ? new Date(t.installDate) : parseThaiDateTime(t.dateTime);
                if (d) { let m = d.getMonth() + 1; if (m >= 1 && m <= 12) { if (t.status.includes('สำเร็จ')) monthlyData[m].done++; else monthlyData[m].ongoing++; } }
            });
            const dlStyle = { color: '#ffffff', font: { weight: 'bold', size: 12, family: 'Prompt' }, display: (c) => c.dataset.data[c.dataIndex] > 0, textStrokeColor: 'rgba(15, 23, 42, 0.85)', textStrokeWidth: 4 };
            const barChartData = { labels: ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."], datasets: [ { label: 'สำเร็จ (Done)', data: Object.values(monthlyData).map(d => d.done), backgroundColor: 'rgba(16, 185, 129, 0.8)', borderRadius: 4 }, { label: 'กำลังดำเนินการ (Ongoing)', data: Object.values(monthlyData).map(d => d.ongoing), backgroundColor: 'rgba(59, 130, 246, 0.8)', borderRadius: 4 } ] };
            const barChartOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top' }, datalabels: dlStyle }, scales: { y: { beginAtZero: true } } };

            const activeTeams = [...new Set(chartFilteredTasks.flatMap(t => t.equipTeams || []))];
            const activeStatusesForTeam = [...new Set(chartFilteredTasks.map(t => t.status))];
            const teamChartData = { labels: activeTeams, datasets: activeStatusesForTeam.map(status => ({ label: status, data: activeTeams.map(team => chartFilteredTasks.filter(t => (t.equipTeams || []).includes(team) && t.status === status).length), backgroundColor: getStatusColorConfig(status).bg, borderColor: getStatusColorConfig(status).border, borderWidth: 1 })) };
            const teamChartOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' }, datalabels: dlStyle }, scales: { x: { stacked: false }, y: { beginAtZero: true } } };

            return (
                <div className="space-y-6 max-w-7xl mx-auto">
                    <header className="flex flex-col md:flex-row justify-between md:items-start gap-4">
                        <div>
                            <h2 className="text-xl md:text-3xl font-bold text-slate-900">ภาพรวมโครงการ (Region Assignment)</h2>
                            <p className="text-xs md:text-sm text-slate-500 mt-1">สรุปข้อมูลจากระบบ Region Assignment (อิงจากวันที่ติดตั้ง)</p>
                        </div>
                        <div className="flex flex-wrap gap-3 bg-white p-3 rounded-xl shadow-sm border border-slate-200 items-center">
                            <div className="flex items-center gap-2"><label className="text-xs font-semibold text-slate-600">เดือนติดตั้ง:</label><select value={filterMonth} onChange={e => setFilterMonth(e.target.value)} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs bg-white outline-none"><option value="All">ทั้งหมด</option>{uniqueMonths.map(m => <option key={m} value={m}>{monthNames[m-1]}</option>)}</select></div>
                            <div className="flex items-center gap-2"><label className="text-xs font-semibold text-slate-600">ทีมอุปกรณ์:</label><MultiSelect options={uniqueTeams} selected={filterTeams} onChange={setFilterTeams} placeholder="ทีมงาน" /></div>
                        </div>
                    </header>

                    <div className="flex flex-nowrap overflow-x-auto gap-3 md:gap-4 pb-2 px-1 custom-scrollbar">
                        <div className="bg-slate-800 text-white p-3 md:p-4 rounded-xl shadow-md border border-slate-700 flex-shrink-0 min-w-[140px] flex flex-col items-center justify-center gap-2"><p className="text-xs font-semibold text-slate-300">จำนวนงานทั้งหมด</p><p className="text-3xl md:text-5xl font-bold">{totalTasksCount}</p></div>
                        {sortedStatuses.map(status => {
                            const isSelected = selectedStatuses.length === 0 || selectedStatuses.includes(status);
                            const conf = getStatusColorConfig(status);
                            return (
                                <div key={status} onClick={() => setSelectedStatuses(selectedStatuses.includes(status) ? selectedStatuses.filter(s => s !== status) : [...selectedStatuses, status])} className={`p-3 md:p-4 rounded-xl shadow-md border-b-4 cursor-pointer transition-all duration-200 select-none flex-shrink-0 min-w-[140px] flex flex-col justify-between ${isSelected ? 'scale-100 ring-2 ring-offset-2' : 'scale-95 opacity-70 hover:opacity-100'}`} style={{ backgroundColor: isSelected ? conf.soft : '#ffffff', borderColor: conf.border, '--tw-ring-color': conf.border }}>
                                    <div className="flex justify-between items-start"><p className="text-xs font-bold truncate pr-2" style={{ color: conf.text }}>{status}</p>{isSelected && selectedStatuses.length > 0 && <i className="fa-solid fa-circle-check text-xs" style={{ color: conf.text }}></i>}</div>
                                    <p className="text-2xl md:text-4xl font-bold mt-2" style={{ color: conf.text }}>{statusCounts[status]}</p>
                                </div>
                            );
                        })}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-1 flex flex-col relative"><div className="flex justify-between items-center mb-4"><h3 className="text-base font-bold flex items-center gap-2"><i className="fa-solid fa-chart-pie text-blue-600"></i> สัดส่วนสถานะงาน</h3></div><div className="relative flex-1 w-full flex flex-col items-center justify-center min-h-[250px]">{chartFilteredTasks.length > 0 ? (<><div className="relative mx-auto w-48 h-48"><div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none"><span className="text-4xl font-extrabold text-slate-800">{chartFilteredTasks.length}</span><span className="text-xs font-bold text-slate-500 mt-1">CIDs</span></div><ChartComponent type="doughnut" data={statusChartData} options={statusChartOptions} /></div></>) : <p className="text-slate-400">ไม่มีข้อมูล</p>}</div></div>
                        <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-2"><h3 className="text-base font-bold mb-4 flex items-center gap-2"><i className="fa-solid fa-chart-column text-blue-600"></i> สรุปแผนปฏิบัติงานรายเดือน</h3><div className="relative h-60 w-full"><ChartComponent type="bar" data={barChartData} options={barChartOptions} /></div></div>
                        <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 lg:col-span-3"><h3 className="text-base font-bold mb-4 flex items-center gap-2"><i className="fa-solid fa-users text-blue-600"></i> ปริมาณงานแยกตามทีม</h3><div className="relative h-64 w-full overflow-x-auto custom-scrollbar"><div className="min-w-[600px] h-full">{chartFilteredTasks.length > 0 ? <ChartComponent type="bar" data={teamChartData} options={teamChartOptions} /> : <p className="text-center mt-20">ไม่มีข้อมูล</p>}</div></div></div>
                    </div>
                </div>
            );
        };

        const CalendarView = ({ systemMode, tasksSys1, tasksSys2, tasksSys3, masterData }) => {
            const [calendarView, setCalendarView] = useState('month');
            const [currentDate, setCurrentDate] = useState(new Date());
            const [tooltipData, setTooltipData] = useState({ visible: false, task: null, x: 0, y: 0 });
            const [visibleSystems, setVisibleSystems] = useState(['sys1', 'sys2', 'sys3']);

            const toggleSystem = (sys) => {
                if (visibleSystems.includes(sys)) setVisibleSystems(visibleSystems.filter(s => s !== sys));
                else setVisibleSystems([...visibleSystems, sys]);
            };

            const navigateCalendar = (dir) => { const nd = new Date(currentDate); if (calendarView === 'month') nd.setMonth(nd.getMonth() + dir); else if (calendarView === 'week') nd.setDate(nd.getDate() + (dir * 7)); else nd.setDate(nd.getDate() + dir); setCurrentDate(nd); };
            const monthSlots = [...Array(getFirstDayOfMonth(currentDate.getFullYear(), currentDate.getMonth())).fill(null), ...Array.from({length: getDaysInMonth(currentDate.getFullYear(), currentDate.getMonth())}, (_, i) => new Date(currentDate.getFullYear(), currentDate.getMonth(), i + 1))];
            const weekSlots = Array.from({length: 7}, (_, i) => { const d = new Date(currentDate); d.setDate(d.getDate() - d.getDay() + i); return d; });

            const getTasksForDateObj = (dateObj) => {
                if (!dateObj) return [];
                let allTasks = [];
                
                if (systemMode === 'sys1' || (systemMode === 'all' && visibleSystems.includes('sys1'))) {
                    const mappedSys1 = tasksSys1.filter(t => { const tDate = t.installDate ? new Date(t.installDate) : parseThaiDateTime(t.dateTime); return tDate && tDate.getDate() === dateObj.getDate() && tDate.getMonth() === dateObj.getMonth() && tDate.getFullYear() === dateObj.getFullYear(); }).map(t => ({...t, _sys: 'sys1', _title: t.customerName || 'No Name', _sub: Array.isArray(t.equipTeams) ? t.equipTeams.join(', ') : '-', _cid: t.cid, _time: t.startTime && t.endTime ? `${t.startTime} - ${t.endTime}` : (t.installDate || t.dateTime.split(' ')[0]) }));
                    allTasks = [...allTasks, ...mappedSys1];
                }
                if (systemMode === 'sys2' || (systemMode === 'all' && visibleSystems.includes('sys2'))) {
                    const mappedSys2 = tasksSys2.filter(t => { const tDate = parseThaiDateTime(t.date); return tDate && tDate.getDate() === dateObj.getDate() && tDate.getMonth() === dateObj.getMonth() && tDate.getFullYear() === dateObj.getFullYear(); }).map(t => ({...t, _sys: 'sys2', _title: t.location || 'No Location', _sub: t.surveyor || '-', _cid: t.surveyId, _time: t.date }));
                    allTasks = [...allTasks, ...mappedSys2];
                }
                if (systemMode === 'sys3' || (systemMode === 'all' && visibleSystems.includes('sys3'))) {
                    const mappedSys3 = tasksSys3.filter(t => { const tDate = parseThaiDateTime(t.date); return tDate && tDate.getDate() === dateObj.getDate() && tDate.getMonth() === dateObj.getMonth() && tDate.getFullYear() === dateObj.getFullYear(); }).map(t => ({...t, _sys: 'sys3', _title: `CID: ${t.cid || '-'}`, _sub: `${t.fromPort || '-'} -> ${t.toPort || '-'}`, _cid: t.cid, _time: t.date }));
                    allTasks = [...allTasks, ...mappedSys3];
                }
                return allTasks;
            };

            const getStatusColorConfig = (statusName) => {
                const found = masterData.statuses.find(s => s.name === statusName);
                if (found) return { bg: hexToRgbA(found.bg, 0.15), border: found.bg, text: found.text, solidBg: found.bg };
                return { bg: '#f1f5f9', border: '#cbd5e1', text: '#475569', solidBg: '#94a3b8' };
            };

            const getTeamColorStyle = (teamName) => {
                if (!teamName || String(teamName).trim() === '') return { bg: '#f1f5f9', text: '#475569', border: '#e2e8f0' };
                const fallbackTeamColors = [ { bg: '#f3e8ff', text: '#7e22ce', border: '#e9d5ff' }, { bg: '#ccfbf1', text: '#0f766e', border: '#99f6e4' }, { bg: '#ffedd5', text: '#c2410c', border: '#fed7aa' }, { bg: '#e0e7ff', text: '#4338ca', border: '#c7d2fe' }, { bg: '#dcfce7', text: '#15803d', border: '#bbf7d0' }, { bg: '#ffe4e6', text: '#be123c', border: '#fecdd3' } ];
                let str = String(teamName).trim(); let hash = 0; for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
                return fallbackTeamColors[Math.abs(hash) % fallbackTeamColors.length];
            };

            const handleMouseMove = (e, task) => {
                const tooltipWidth = 260, tooltipHeight = 150; let x = e.clientX + 15, y = e.clientY + 15;
                if (x + tooltipWidth > window.innerWidth) x = e.clientX - tooltipWidth - 15;
                if (y + tooltipHeight > window.innerHeight) y = e.clientY - tooltipHeight - 15;
                setTooltipData({ visible: true, task, x: Math.max(10, x), y: Math.max(10, y) });
            };
            const handleMouseLeave = () => setTooltipData({ visible: false, task: null, x: 0, y: 0 });

            const calendarTitle = systemMode === 'sys1' ? 'ปฏิทินงาน Region Assignment' : systemMode === 'sys2' ? 'ปฏิทินงานสำรวจ' : systemMode === 'sys3' ? 'ปฏิทิน Cross Connect' : 'ปฏิทินรวมทุกระบบงาน';

            return (
                <div className="flex flex-col h-full overflow-hidden">
                    <header className="flex flex-col gap-4 mb-4 shrink-0">
                        <div className="flex flex-col md:flex-row justify-between md:items-start gap-4">
                            <div>
                                <h2 className="text-xl md:text-3xl font-bold text-slate-900">{calendarTitle}</h2>
                                <p className="text-xs text-slate-500 mt-1">แสดงแผนงานจากระบบตามช่วงเวลาที่กำหนด</p>
                                
                                {systemMode === 'all' && (
                                    <div className="flex flex-wrap items-center gap-2 mt-3">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider mr-1">แสดงระบบ:</span>
                                        <label className="flex items-center gap-1.5 cursor-pointer text-xs font-semibold text-blue-700 bg-blue-50 px-2.5 py-1.5 rounded-lg border border-blue-100 shadow-sm transition-colors hover:bg-blue-100 select-none">
                                            <input type="checkbox" checked={visibleSystems.includes('sys1')} onChange={() => toggleSystem('sys1')} className="w-3.5 h-3.5 cursor-pointer accent-blue-600" />
                                            1. Region Assignment
                                        </label>
                                        <label className="flex items-center gap-1.5 cursor-pointer text-xs font-semibold text-amber-700 bg-amber-50 px-2.5 py-1.5 rounded-lg border border-amber-100 shadow-sm transition-colors hover:bg-amber-100 select-none">
                                            <input type="checkbox" checked={visibleSystems.includes('sys2')} onChange={() => toggleSystem('sys2')} className="w-3.5 h-3.5 cursor-pointer accent-amber-500" />
                                            2. ควบคุมงานสำรวจ
                                        </label>
                                        <label className="flex items-center gap-1.5 cursor-pointer text-xs font-semibold text-emerald-700 bg-emerald-50 px-2.5 py-1.5 rounded-lg border border-emerald-100 shadow-sm transition-colors hover:bg-emerald-100 select-none">
                                            <input type="checkbox" checked={visibleSystems.includes('sys3')} onChange={() => toggleSystem('sys3')} className="w-3.5 h-3.5 cursor-pointer accent-emerald-600" />
                                            3. ออเดอร์ Cross Connect
                                        </label>
                                    </div>
                                )}
                            </div>
                            <div className="flex flex-col items-end gap-3 w-full md:w-auto mt-2 md:mt-0">
                                <div className="flex bg-slate-200 p-1 rounded-lg w-full sm:w-auto">
                                    <button onClick={() => setCalendarView('day')} className={`flex-1 px-3 py-1.5 text-xs font-semibold rounded-md ${calendarView === 'day' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600'}`}>รายวัน</button>
                                    <button onClick={() => setCalendarView('week')} className={`flex-1 px-3 py-1.5 text-xs font-semibold rounded-md ${calendarView === 'week' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600'}`}>สัปดาห์</button>
                                    <button onClick={() => setCalendarView('month')} className={`flex-1 px-3 py-1.5 text-xs font-semibold rounded-md ${calendarView === 'month' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600'}`}>เดือน</button>
                                </div>
                                <div className="flex items-center justify-between w-full md:w-auto gap-4">
                                    <h3 className="text-base md:text-xl font-bold text-blue-700 min-w-[150px] text-right">
                                        {calendarView === 'month' && `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`}
                                        {calendarView === 'week' && `สัปดาห์ที่ ${currentDate.getDate()} ${monthNames[currentDate.getMonth()]}`}
                                        {calendarView === 'day' && `${currentDate.getDate()} ${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`}
                                    </h3>
                                    <div className="flex gap-1 shrink-0">
                                        <button onClick={() => navigateCalendar(-1)} className="p-1.5 bg-white border rounded-lg hover:bg-slate-50"><i className="fa-solid fa-chevron-left"></i></button>
                                        <button onClick={() => setCurrentDate(new Date())} className="px-2 bg-white border rounded-lg hover:bg-slate-50 text-xs font-bold text-slate-700">วันนี้</button>
                                        <button onClick={() => navigateCalendar(1)} className="p-1.5 bg-white border rounded-lg hover:bg-slate-50"><i className="fa-solid fa-chevron-right"></i></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="flex-1 flex flex-col min-h-0 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative">
                        <div className="grid grid-cols-7 border-b border-slate-200 bg-slate-50 shrink-0">
                            {['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'].map((d, i) => (<div key={d} className="py-2 text-center text-xs font-semibold text-slate-600 border-r border-slate-200"><span className="md:hidden">{['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'][i]}</span><span className="hidden md:inline">{d}</span></div>))}
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scrollbar bg-slate-100/50">
                            {calendarView === 'month' && (
                                <div className="grid grid-cols-7 h-full min-h-[500px] auto-rows-fr">
                                    {monthSlots.map((dateObj, idx) => {
                                        const dayTasks = getTasksForDateObj(dateObj);
                                        return (
                                            <div key={idx} className="bg-white p-1 md:p-2 border-r border-b border-slate-200 flex flex-col hover:bg-blue-50/30 overflow-hidden min-h-[100px]">
                                                {dateObj && (
                                                    <>
                                                        <div className="text-right mb-1"><span className={`inline-block w-6 h-6 leading-6 text-center rounded-full text-xs font-semibold ${dateObj.getDate() === new Date().getDate() && dateObj.getMonth() === new Date().getMonth() ? 'bg-blue-600 text-white shadow-md' : 'text-slate-700 hover:bg-blue-100 hover:text-blue-700 cursor-pointer transition-all'}`} onClick={() => { setCalendarView('day'); setCurrentDate(dateObj); }}>{dateObj.getDate()}</span></div>
                                                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-1 space-y-1">
                                                            {dayTasks.map(t => {
                                                                const conf = getStatusColorConfig(t.status);
                                                                return (
                                                                    <div key={t.id} className="p-1.5 md:p-2 rounded-lg md:rounded-xl border border-l-2 md:border-l-4 shadow-sm bg-white text-[9px] md:text-xs space-y-1 cursor-pointer hover:shadow-md transition-shadow" style={{borderLeftColor: conf.border}} onMouseMove={(e)=>handleMouseMove(e, t)} onMouseLeave={handleMouseLeave} onClick={() => { if(window.innerWidth <= 1024) { setCalendarView('day'); setCurrentDate(dateObj); } }}>
                                                                        <div className="flex justify-between items-center mb-0.5"><div className="text-slate-500 font-semibold truncate text-[8px] md:text-[10px]">{t._sub}</div>{systemMode === 'all' && <span className="text-[7px] bg-slate-100 text-slate-400 px-1 rounded uppercase">{t._sys}</span>}</div>
                                                                        <div className="font-bold text-slate-800 leading-tight line-clamp-2" title={t._title}>{t._title}</div>
                                                                        <div className="flex items-center gap-1 text-slate-600 font-medium text-[8px] md:text-[10px] mt-0.5 flex-wrap"><i className="fa-regular fa-calendar-check text-blue-600"></i> {t._time} </div>
                                                                        <div className="mt-1 text-center font-bold px-1 py-0.5 rounded border text-[8px] md:text-[10px] truncate" style={{backgroundColor: conf.bg, color: conf.border, borderColor: conf.border}}>{t.status || 'No Status'}</div>
                                                                    </div>
                                                                )
                                                            })}
                                                        </div>
                                                    </>
                                                )}
                                            </div>
                                        )
                                    })}
                                </div>
                            )}
                            
                            {calendarView === 'week' && (
                                <div className="grid grid-cols-7 border-l border-slate-200 h-full min-h-[400px]">
                                    {weekSlots.map((dateObj, idx) => {
                                        const dayTasks = getTasksForDateObj(dateObj);
                                        return (
                                            <div key={`w-${idx}`} className="bg-white p-1 md:p-2 flex flex-col gap-1.5 md:gap-2 bg-slate-50/30 border-r border-b border-slate-200 h-full overflow-hidden min-h-0">
                                                <div className="flex-1 overflow-y-auto custom-scrollbar pr-1 space-y-1.5 min-h-0">
                                                    {dayTasks.map(t => {
                                                        const conf = getStatusColorConfig(t.status);
                                                        return (
                                                            <div key={t.id} style={{borderLeftColor: conf.border}} className="p-1.5 md:p-3 rounded-lg md:rounded-xl border border-l-2 md:border-l-4 shadow-sm bg-white text-[10px] md:text-xs space-y-1 md:space-y-1.5 cursor-pointer hover:shadow-md transition-shadow" onMouseMove={(e) => handleMouseMove(e, t)} onMouseLeave={handleMouseLeave} onClick={() => { if(window.innerWidth <= 1024) { setCalendarView('day'); setCurrentDate(dateObj); } }}>
                                                                <div className="flex justify-between items-center mb-0.5"><div className="text-slate-500 font-semibold truncate">{t._sub}</div>{systemMode === 'all' && <span className="text-[8px] bg-slate-100 text-slate-400 px-1.5 py-0.5 rounded uppercase">{t._sys}</span>}</div>
                                                                <div className="font-bold text-slate-800 break-words leading-tight line-clamp-2">{t._title}</div>
                                                                <div className="flex items-center gap-1 text-slate-600 font-medium px-1 py-0.5 rounded text-[8px] md:text-[10px] w-fit mt-1"><i className="fa-regular fa-calendar-check text-blue-600"></i> {t._time}</div>
                                                                <div className="mt-1.5 text-center font-bold px-1 md:px-2 py-0.5 md:py-1 rounded-md md:rounded-lg border text-[8px] md:text-[10px]" style={{backgroundColor: conf.bg, color: conf.border, borderColor: conf.border}}>{t.status || 'No Status'}</div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                            {calendarView === 'day' && (() => {
                                const dayTasks = getTasksForDateObj(currentDate);
                                return (
                                    <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col p-4 md:p-6 min-h-0 overflow-hidden h-full">
                                        <h4 className="text-base md:text-lg font-bold text-slate-800 mb-4 md:mb-6 border-b pb-3 md:pb-4 flex justify-between items-center shrink-0"><span><i className="fa-regular fa-calendar-check text-blue-600 mr-2"></i> ตารางงานประจำวัน</span><span className="text-xs md:text-sm font-medium bg-blue-100 text-blue-700 px-3 md:px-4 py-1 md:py-1.5 rounded-full shadow-sm">{dayTasks.length} งาน</span></h4>
                                        <div className="flex-1 overflow-y-auto custom-scrollbar pr-2 pb-4">
                                            {dayTasks.length === 0 ? (
                                                <div className="text-center text-slate-400 py-12 md:py-20 flex flex-col items-center"><i className="fa-regular fa-calendar-xmark text-4xl md:text-6xl mb-3 md:mb-4 text-slate-200"></i><p className="text-sm md:text-lg font-medium">ไม่มีแผนงานในวันนี้</p></div>
                                            ) : (
                                                <div className="space-y-3 md:space-y-4">
                                                    {dayTasks.map(t => {
                                                        const conf = getStatusColorConfig(t.status);
                                                        const teamColor = getTeamColorStyle(t._sub.split(',')[0]);
                                                        return (
                                                            <div key={t.id} className="flex bg-white rounded-xl md:rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition-shadow cursor-pointer relative" onMouseMove={(e) => handleMouseMove(e, t)} onMouseLeave={handleMouseLeave}>
                                                                <div style={{backgroundColor: conf.solidBg}} className="w-2 md:w-3 shrink-0"></div>
                                                                <div className="p-3 md:p-4 flex-1 flex flex-col text-xs md:text-sm min-w-0">
                                                                    <div className="flex flex-col lg:flex-row gap-3 md:gap-4 lg:items-center w-full min-w-0">
                                                                        <div className="flex-1 flex flex-col lg:flex-row gap-3 lg:gap-4 lg:items-center min-w-0">
                                                                            <div className="flex flex-col justify-center items-start shrink-0 lg:pr-4 lg:border-r border-slate-200"><p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider mb-1">รายละเอียดทีม / งาน</p><div className="px-2 py-1 md:py-1.5 rounded-md text-sm md:text-base font-bold border w-32 md:w-40 text-center truncate shadow-sm" style={{ backgroundColor: teamColor.bg, color: teamColor.text, borderColor: teamColor.border }} title={t._sub}>{t._sub}</div></div>
                                                                            <div className="flex-1 flex flex-col justify-center overflow-hidden min-w-0 lg:pr-2"><p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider">ชื่อรายการ / ลูกค้า</p><p className="font-bold text-slate-800 text-sm md:text-base leading-tight truncate mt-0.5" title={t._title}>{t._cid && <span className="text-blue-600 mr-1">[{t._cid}]</span>}<span>{t._title}</span></p></div>
                                                                            <div className="flex flex-col sm:flex-row gap-3 sm:gap-6 shrink-0 lg:pl-2">
                                                                                <div className="flex flex-col justify-center shrink-0"><p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider">วันเวลา (Date/Time)</p><div className="flex items-center gap-2 mt-0.5 text-sm md:text-base font-bold text-slate-700"><p><i className="fa-regular fa-calendar-check text-blue-600 mr-1"></i> {t._time}</p></div></div>
                                                                                {systemMode === 'all' && <div className="flex flex-col justify-center shrink-0"><p className="text-[10px] md:text-xs text-slate-400 font-semibold uppercase tracking-wider">ระบบ</p><p className="mt-0.5 text-sm md:text-base font-bold text-slate-500 uppercase">{t._sys}</p></div>}
                                                                            </div>
                                                                        </div>
                                                                        <div className="flex justify-start lg:justify-end mt-2 lg:mt-0 shrink-0 border-t lg:border-t-0 lg:border-l border-slate-200 pt-3 lg:pt-0 lg:pl-4"><span style={{backgroundColor: conf.bg, color: conf.border, borderColor: conf.border}} className="font-bold px-4 md:px-6 py-1.5 md:py-2 rounded-lg md:rounded-xl border-2 text-center min-w-[120px] md:min-w-[140px] shadow-sm">{t.status || 'No Status'}</span></div>
                                                                    </div>
                                                                    {t.remark && <div className="mt-3 pt-3 border-t border-slate-100 w-full"><p className="text-[10px] md:text-xs text-amber-600 font-semibold uppercase tracking-wider">หมายเหตุเพิ่มเติม</p><p className="text-slate-600 text-xs mt-0.5 break-words">{t.remark}</p></div>}
                                                                </div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })()}
                        </div>

                        {tooltipData.visible && tooltipData.task && (
                            <div className="fixed z-[9999] bg-white p-4 rounded-xl shadow-2xl border border-blue-200 w-[260px] pointer-events-none" style={{ left: tooltipData.x, top: tooltipData.y }}>
                                <div className="flex justify-between items-start mb-2 border-b pb-2"><h4 className="font-bold text-slate-800 text-sm truncate pr-2">{tooltipData.task._title}</h4><span className="text-[8px] bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded uppercase shrink-0">{tooltipData.task._sys}</span></div>
                                <div className="text-xs space-y-1.5 text-slate-600">
                                    <p><span className="font-semibold text-slate-400">ID / CID:</span> <span className="text-blue-600 font-bold">{tooltipData.task._cid || '-'}</span></p>
                                    <p><span className="font-semibold text-slate-400">ผู้รับผิดชอบ:</span> {tooltipData.task._sub}</p>
                                    <p><span className="font-semibold text-slate-400">วันที่:</span> {tooltipData.task._time}</p>
                                    <p><span className="font-semibold text-slate-400">สถานะ:</span> <span className="font-bold" style={{color: getStatusColorConfig(tooltipData.task.status).text}}>{tooltipData.task.status || 'ไม่มี'}</span></p>
                                    {tooltipData.task.scopeOfWork && <p><span className="font-semibold text-slate-400">Scope:</span> {tooltipData.task.scopeOfWork === 'อื่นๆ (Other)' && tooltipData.task.otherScopeDetail ? `อื่นๆ: ${tooltipData.task.otherScopeDetail}` : tooltipData.task.scopeOfWork}</p>}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        function App() {
            const [activeTab, setActiveTab] = useState('main_dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = useState(window.innerWidth > 1024);
            const [openModalForm, setOpenModalForm] = useState(null); 
            
            const [masterData, setMasterData] = useState(defaultMasterData);
            const [tasksSys1, setTasksSys1] = useState([]);
            const [tasksSys2, setTasksSys2] = useState([]);
            const [tasksSys3, setTasksSys3] = useState([]);
            
            // Firebase Auth State
            const [user, setUser] = useState(null);
            const [isDbReady, setIsDbReady] = useState(false);

            // 1. Initialize Firebase & Auth
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                        if (!firebaseConfig) { console.warn("No Firebase Config found in environment"); return; }
                        
                        appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                        
                        if (!window.FirebaseLib) throw new Error("Firebase Library not loaded yet.");
                        const { initializeApp, getAuth, getFirestore, onAuthStateChanged, signInWithCustomToken, signInAnonymously } = window.FirebaseLib;
                        
                        app = initializeApp(firebaseConfig);
                        auth = getAuth(app);
                        db = getFirestore(app);

                        // Rule 3: Auth First
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }

                        onAuthStateChanged(auth, (currentUser) => {
                            setUser(currentUser);
                            if(currentUser) setIsDbReady(true);
                        });

                    } catch (error) {
                        console.error("Firebase Init Error:", error);
                    }
                };
                initFirebase();
            }, []);

            // 2. Fetch Data via onSnapshot (Real-time Cloud Sync)
            useEffect(() => {
                if (!isDbReady || !user) return; // Rule 3: Guard with user
                const { collection, onSnapshot, doc } = window.FirebaseLib;

                // Sync Master Data
                const unsubMaster = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'masterData'), 
                    (docSnap) => {
                        if (docSnap.exists()) {
                            let parsed = docSnap.data();
                            if (parsed.statuses && parsed.statuses[0] && (parsed.statuses[0].bg === '#fef3c7' || parsed.statuses[0].bg === '#e2e8f0')) parsed.statuses = defaultMasterData.statuses;
                            if (!parsed.scopeOfWorks) parsed.scopeOfWorks = defaultMasterData.scopeOfWorks;
                            if (!parsed.scopeOfWorks.includes("กำหนดเวลาเอง (Custom)")) parsed.scopeOfWorks.push("กำหนดเวลาเอง (Custom)");
                            if (!parsed.scopeOfWorks.includes("อื่นๆ (Other)")) parsed.scopeOfWorks.push("อื่นๆ (Other)");
                            setMasterData(parsed);
                        } else {
                            // If first time, set default
                            const { setDoc } = window.FirebaseLib;
                            setDoc(docSnap.ref, defaultMasterData).catch(e=>console.error(e));
                        }
                    }, 
                    (error) => console.error("Error fetching master data:", error)
                );

                // Helper to sync tasks collections
                const syncCollection = (colName, setStateFunc) => {
                    return onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', colName), 
                        (snap) => {
                            const items = [];
                            snap.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
                            // Sort locally desc by createdAt if needed, or by id
                            items.sort((a,b) => b.id.localeCompare(a.id));
                            setStateFunc(items);
                        },
                        (error) => console.error(`Error fetching ${colName}:`, error)
                    );
                };

                const unsubSys1 = syncCollection('tasksSys1', setTasksSys1);
                const unsubSys2 = syncCollection('tasksSys2', setTasksSys2);
                const unsubSys3 = syncCollection('tasksSys3', setTasksSys3);

                return () => {
                    unsubMaster(); unsubSys1(); unsubSys2(); unsubSys3();
                };
            }, [isDbReady, user]);

            const handleUpdateTaskInCloud = async (colName, taskId, key, val) => {
                if (!isDbReady) return;
                const { doc, setDoc } = window.FirebaseLib;
                
                let updatedData = { [key]: val };
                updatedData.dateTime = new Date().toLocaleString('th-TH', { hour12: false });
                
                // Specific logic for Sys1 Time calculation
                if (colName === 'tasksSys1' && (key === 'scopeOfWork' || key === 'startTime')) {
                     const currentTask = tasksSys1.find(t => t.id === taskId);
                     if (currentTask) {
                         const tempTask = { ...currentTask, [key]: val };
                         const isCustom = (tempTask.scopeOfWork || '').includes('กำหนดเวลาเอง') || (tempTask.scopeOfWork || '').includes('Custom') || (tempTask.scopeOfWork || '') === 'อื่นๆ (Other)';
                         if (!isCustom && tempTask.startTime) {
                             const duration = getScopeDuration(tempTask.scopeOfWork);
                             const [h, m] = tempTask.startTime.split(':').map(Number);
                             const date = new Date();
                             date.setHours(h, m + duration);
                             updatedData.endTime = `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
                         }
                     }
                }

                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, taskId), updatedData, { merge: true });
                } catch (e) {
                    console.error("Update error:", e);
                    window.customAlert("❌ เกิดข้อผิดพลาดในการอัปเดตข้อมูลบน Cloud");
                }
            };

            const handleUpdateSys1 = (taskId, key, val) => handleUpdateTaskInCloud('tasksSys1', taskId, key, val);
            const handleUpdateSys2 = (taskId, key, val) => handleUpdateTaskInCloud('tasksSys2', taskId, key, val);
            const handleUpdateSys3 = (taskId, key, val) => handleUpdateTaskInCloud('tasksSys3', taskId, key, val);

            const [modalState, setModalState] = useState({ isOpen: false, msg: '', type: 'alert', onConfirm: null });
            useEffect(() => {
                window.customAlert = (msg) => setModalState({ isOpen: true, msg, type: 'alert', onConfirm: null });
                window.customConfirm = (msg, onConfirmCallback) => setModalState({ isOpen: true, msg, type: 'confirm', onConfirm: onConfirmCallback });
            }, []);

            const SidebarItem = ({ id, icon, label, subItems = [] }) => {
                const isActive = activeTab === id || subItems.some(s => s.id === activeTab);
                const [isExpanded, setIsExpanded] = useState(isActive);

                useEffect(() => {
                    if (subItems.some(s => s.id === activeTab)) setIsExpanded(true);
                }, [activeTab]);

                const handleParentClick = () => {
                    if (subItems.length > 0) {
                        setIsExpanded(!isExpanded);
                        if (!isExpanded && !subItems.some(s => s.id === activeTab)) {
                            setActiveTab(subItems[0].id);
                        }
                    } else {
                        setActiveTab(id);
                        if(window.innerWidth <= 1024) setIsSidebarOpen(false);
                    }
                };

                return (
                    <div className="space-y-1">
                        <button onClick={handleParentClick} className={`w-full flex items-center px-4 py-3 rounded-xl transition-colors ${isActive ? 'bg-blue-50 text-blue-700 font-bold shadow-sm border border-blue-100' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900 font-medium'}`}>
                            <i className={`${icon} text-lg w-6 text-center ${isActive ? 'text-blue-600' : 'opacity-70'} mr-3`}></i>
                            <span className="whitespace-nowrap flex-1 text-left">{label}</span>
                            {subItems.length > 0 && <i className={`fa-solid fa-chevron-down text-[10px] transition-transform ${isExpanded ? 'rotate-180' : ''}`}></i>}
                        </button>
                        {isExpanded && subItems.length > 0 && (
                            <div className="pl-14 pr-4 space-y-1 pb-2 pt-1">
                                {subItems.map(sub => (
                                    <button key={sub.id} onClick={() => { setActiveTab(sub.id); if(window.innerWidth <= 1024) setIsSidebarOpen(false); }} className={`w-full flex items-center text-left px-3 py-2 text-sm rounded-lg transition-colors ${activeTab === sub.id ? 'bg-blue-50 text-blue-700 font-semibold' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800'}`}>
                                        <div className={`w-1.5 h-1.5 rounded-full mr-2 ${activeTab === sub.id ? 'bg-blue-600' : 'bg-slate-300'}`}></div>
                                        {sub.label}
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="fixed inset-0 flex w-full bg-slate-50 text-slate-900 overflow-hidden">
                    <aside className={`bg-white text-slate-800 flex flex-col shadow-[4px_0_24px_rgba(0,0,0,0.05)] z-50 shrink-0 transition-all duration-300 absolute lg:relative h-full ${isSidebarOpen ? 'w-72 translate-x-0' : 'w-0 -translate-x-full lg:translate-x-0 overflow-hidden'} border-r border-slate-200`}>
                        <div className="p-6 h-auto min-h-[80px] flex items-center border-b border-slate-100 shrink-0">
                            <h1 className="text-lg font-bold flex items-center gap-3 w-full overflow-hidden">
                                <div className="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center shrink-0"><i className="fa-solid fa-layer-group text-xl"></i></div>
                                <div className="flex flex-col min-w-0">
                                    <span className="truncate tracking-wide text-blue-700">MASS</span>
                                    <span className="text-[9px] text-slate-500 font-normal truncate" title="Management And Service System">Management And Service System</span>
                                </div>
                            </h1>
                        </div>
                        <nav className="flex-1 px-4 py-4 space-y-2 overflow-y-auto custom-scrollbar">
                            <SidebarItem id="main_dashboard" icon="fa-solid fa-house-chimney" label="Main Dashboard" />
                            <div className="my-3 border-t border-slate-100"></div>
                            <SidebarItem id="sys1_root" icon="fa-solid fa-user-gear" label="Region Assignment" subItems={[{ id: 'dashboard_sys1', label: 'ภาพรวม (Dashboard)' }, { id: 'calendar_sys1', label: 'ปฏิทิน (Calendar)' }, { id: 'table_sys1', label: 'ตารางงาน Region' }]} />
                            <SidebarItem id="sys2_root" icon="fa-solid fa-map-location-dot" label="ควบคุมงานสำรวจ" subItems={[{ id: 'dashboard_sys2', label: 'ภาพรวม (Dashboard)' }, { id: 'calendar_sys2', label: 'ปฏิทิน (Calendar)' }, { id: 'table_sys2', label: 'ตารางงานสำรวจ' }]} />
                            <SidebarItem id="sys3_root" icon="fa-solid fa-network-wired" label="ออเดอร์ Cross Connect" subItems={[{ id: 'dashboard_sys3', label: 'ภาพรวม (Dashboard)' }, { id: 'calendar_sys3', label: 'ปฏิทิน (Calendar)' }, { id: 'table_sys3', label: 'ตารางออเดอร์' }]} />
                            <div className="my-3 border-t border-slate-100"></div>
                            <SidebarItem id="combined_calendar" icon="fa-solid fa-calendar-day" label="ปฏิทินรวมทุกระบบงาน" />
                        </nav>
                        <div className="p-4 border-t border-slate-200 bg-white shrink-0">
                            <button onClick={() => { setActiveTab('master_data'); if(window.innerWidth <= 1024) setIsSidebarOpen(false); }} className={`w-full flex items-center space-x-3 px-3 py-2.5 rounded-xl transition-colors ${activeTab === 'master_data' ? 'bg-blue-50 text-blue-700 font-bold shadow-sm border border-blue-100' : 'text-slate-600 hover:bg-slate-50 font-medium'}`}>
                                <i className="fa-solid fa-database w-6 text-center text-blue-600"></i> <span>ฐานข้อมูล (Master Data)</span>
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 relative w-full h-full overflow-hidden bg-slate-50 flex flex-col">
                        <header className="p-4 md:p-6 bg-white border-b border-slate-200 shrink-0 flex items-center gap-3">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 bg-slate-100 rounded-lg hover:bg-slate-200 lg:hidden"><i className="fa-solid fa-bars"></i></button>
                            <h2 className="text-xl md:text-2xl font-bold text-slate-800 flex-1">
                                {activeTab === 'main_dashboard' && 'ภาพรวมทุกระบบงาน (Main Dashboard)'}
                                {activeTab === 'dashboard_sys1' && 'ภาพรวมระบบ Region Assignment'}
                                {activeTab === 'dashboard_sys2' && 'ภาพรวมระบบควบคุมงานสำรวจ'}
                                {activeTab === 'dashboard_sys3' && 'ภาพรวมออเดอร์ Cross Connect'}
                                {activeTab === 'calendar_sys1' && 'ปฏิทินงาน Region Assignment'}
                                {activeTab === 'calendar_sys2' && 'ปฏิทินงานสำรวจ'}
                                {activeTab === 'calendar_sys3' && 'ปฏิทิน Cross Connect'}
                                {activeTab === 'combined_calendar' && 'ปฏิทินรวมทุกระบบงาน'}
                                {activeTab === 'table_sys1' && 'ตารางงาน Region Assignment'}
                                {activeTab === 'table_sys2' && 'ตารางงานสำรวจ'}
                                {activeTab === 'table_sys3' && 'ตารางออเดอร์ Cross Connect'}
                                {activeTab === 'master_data' && 'จัดการฐานข้อมูล (Master Data)'}
                            </h2>
                            {/* Cloud Status Indicator */}
                            <div className="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-200">
                                {isDbReady ? (
                                    <><div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div> <span className="text-[10px] font-bold text-slate-600">Cloud Synced</span></>
                                ) : (
                                    <><div className="w-2 h-2 rounded-full bg-orange-500"></div> <span className="text-[10px] font-bold text-slate-600">Connecting...</span></>
                                )}
                            </div>
                        </header>
                        
                        <div className="flex-1 p-4 md:p-6 overflow-y-auto custom-scrollbar flex flex-col min-h-0 relative">
                            {activeTab === 'main_dashboard' && <MainDashboardView tasksSys1={tasksSys1} tasksSys2={tasksSys2} tasksSys3={tasksSys3} />}
                            {activeTab === 'dashboard_sys1' && <DashboardView systemMode="sys1" tasksSys1={tasksSys1} masterData={masterData} />}
                            {activeTab === 'dashboard_sys2' && <DashboardView systemMode="sys2" tasksSys1={tasksSys2} masterData={masterData} />}
                            {activeTab === 'dashboard_sys3' && <DashboardView systemMode="sys3" tasksSys1={tasksSys3} masterData={masterData} />}
                            
                            {activeTab === 'calendar_sys1' && <CalendarView systemMode="sys1" tasksSys1={tasksSys1} tasksSys2={tasksSys2} tasksSys3={tasksSys3} masterData={masterData} />}
                            {activeTab === 'calendar_sys2' && <CalendarView systemMode="sys2" tasksSys1={tasksSys1} tasksSys2={tasksSys2} tasksSys3={tasksSys3} masterData={masterData} />}
                            {activeTab === 'calendar_sys3' && <CalendarView systemMode="sys3" tasksSys1={tasksSys1} tasksSys2={tasksSys2} tasksSys3={tasksSys3} masterData={masterData} />}
                            {activeTab === 'combined_calendar' && <CalendarView systemMode="all" tasksSys1={tasksSys1} tasksSys2={tasksSys2} tasksSys3={tasksSys3} masterData={masterData} />}
                            
                            {activeTab === 'table_sys1' && <DataTable title="ตารางงาน Region Assignment" columns={sys1Columns} data={tasksSys1} masterData={masterData} onAddClick={() => setOpenModalForm('sys1')} addLabel="มอบหมายงาน" btnClass="bg-blue-600 hover:bg-blue-700" onUpdateTask={handleUpdateSys1} />}
                            {activeTab === 'table_sys2' && <DataTable title="ตารางงานสำรวจ" columns={sys2Columns} data={tasksSys2} masterData={masterData} onAddClick={() => setOpenModalForm('sys2')} addLabel="เพิ่มงานสำรวจ" btnClass="bg-amber-600 hover:bg-amber-700" onUpdateTask={handleUpdateSys2} />}
                            {activeTab === 'table_sys3' && <DataTable title="ตาราง Cross Connect" columns={sys3Columns} data={tasksSys3} masterData={masterData} onAddClick={() => setOpenModalForm('sys3')} addLabel="เพิ่มออเดอร์" btnClass="bg-emerald-600 hover:bg-emerald-700" onUpdateTask={handleUpdateSys3} />}
                            
                            {activeTab === 'master_data' && (
                                <div className="flex flex-col gap-4">
                                    <div className="bg-indigo-50 border border-indigo-200 p-4 rounded-xl text-indigo-800 shadow-sm flex items-start gap-3 shrink-0">
                                        <i className="fa-solid fa-cloud mt-1 text-indigo-600 text-lg"></i>
                                        <div>
                                            <h3 className="font-bold text-base mb-1">ระบบจัดการฐานข้อมูล (Cloud Master Data)</h3>
                                            <p className="text-sm text-indigo-700/80">ข้อมูลที่คุณอัปเดตที่นี่จะถูกบันทึกขึ้น Cloud ทันที และจะถูกซิงค์ไปยังอุปกรณ์อื่นๆ ที่กำลังเปิดหน้านี้อยู่แบบ Real-time</p>
                                        </div>
                                    </div>
                                    <MasterDataView masterData={masterData} setMasterData={setMasterData} />
                                </div>
                            )}

                            <FormModal isOpen={openModalForm === 'sys1'} onClose={() => setOpenModalForm(null)} title="ฟอร์มมอบหมายงาน Region" iconClass="fa-solid fa-clipboard-user" colorTheme="blue">
                                <AssignSys1Form isModal={true} onClose={() => setOpenModalForm(null)} tasksSys1={tasksSys1} masterData={masterData} />
                            </FormModal>
                            <FormModal isOpen={openModalForm === 'sys2'} onClose={() => setOpenModalForm(null)} title="ฟอร์มบันทึกงานสำรวจ" iconClass="fa-solid fa-map-location-dot" colorTheme="amber">
                                <AssignSys2Form isModal={true} onClose={() => setOpenModalForm(null)} masterData={masterData} />
                            </FormModal>
                            <FormModal isOpen={openModalForm === 'sys3'} onClose={() => setOpenModalForm(null)} title="เปิดออเดอร์ Cross Connect" iconClass="fa-solid fa-network-wired" colorTheme="emerald">
                                <AssignSys3Form isModal={true} onClose={() => setOpenModalForm(null)} masterData={masterData} />
                            </FormModal>
                        </div>
                    </main>

                    {modalState.isOpen && (
                        <div className="fixed inset-0 z-[10000] flex items-center justify-center bg-slate-900/60 p-4">
                            <div className="bg-white rounded-xl shadow-xl max-w-sm w-full p-6 text-center">
                                {modalState.type === 'alert' ? <i className="fa-solid fa-circle-info text-blue-500 text-4xl mb-4"></i> : <i className="fa-solid fa-circle-question text-amber-500 text-4xl mb-4"></i>}
                                <p className="text-slate-800 text-sm md:text-base font-semibold mb-6 whitespace-pre-wrap">{modalState.msg}</p>
                                <div className="flex justify-center gap-3">
                                    {modalState.type === 'confirm' && <button onClick={() => setModalState({ ...modalState, isOpen: false })} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-bold">ยกเลิก</button>}
                                    <button onClick={() => { if (modalState.type === 'confirm' && modalState.onConfirm) modalState.onConfirm(); setModalState({ ...modalState, isOpen: false }); }} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-bold">ตกลง</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
