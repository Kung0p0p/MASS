<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MASS - Management And Service System (Cloud Sync)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Chart.js และ DataLabels -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

    <!-- Firebase SDK (ES Modules) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Expose Firebase to React context
        window.FirebaseLib = {
            initializeApp, getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken,
            getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot
        };
    </script>

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; overflow: hidden; }
        #root { height: 100%; }
        
        .table-container::-webkit-scrollbar { height: 8px; width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .th-content { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 16px; }
        .sortable-header { cursor: pointer; transition: background 0.2s; position: relative; }
        .sortable-header:hover { background-color: #334155 !important; }
        
        .sticky-col-header { position: sticky; z-index: 50; outline: 1px solid #334155; }
        .sticky-col-cell { position: sticky; z-index: 20; background-color: #ffffff; outline: 1px solid #e2e8f0; }
        tr:hover .sticky-col-cell { background-color: #f8fafc; }
        
        /* Modal Animation */
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-animate { animation: fadeInScale 0.2s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // APP VERSION: v1.0.20 (Stable UI Restored)
        // ==========================================
        const APP_VERSION = "1.0.20";

        if (typeof ChartDataLabels !== 'undefined') {
            Chart.register(ChartDataLabels);
        }

        const { useState, useEffect, useRef, useMemo } = React;

        // Firebase Global Instances
        let app, auth, db, appId;

        // Error Boundary
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("React Error Boundary Caught:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center w-full h-screen bg-slate-50 p-8 text-center">
                            <i className="fa-solid fa-triangle-exclamation text-6xl text-red-500 mb-4"></i>
                            <h2 className="text-2xl font-bold text-slate-800 mb-2">เกิดข้อผิดพลาดในการแสดงผล (ระบบขัดข้อง)</h2>
                            <p className="text-slate-500 mb-6 max-w-lg break-words text-sm border p-4 bg-white rounded-lg shadow-inner">
                                {this.state.error && this.state.error.toString()}
                            </p>
                            <button onClick={() => window.location.reload()} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-colors shadow-md">
                                <i className="fa-solid fa-rotate-right mr-2"></i> รีเฟรชหน้าเว็บ
                            </button>
                        </div>
                    );
                }
                return this.props.children; 
            }
        }

        // ==========================================
        // Helpers
        // ==========================================
        const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
        
        const parseThaiDateTime = (dtStr) => {
            if(!dtStr) return null;
            const parts = dtStr.trim().split(' ');
            if(parts.length === 0) return null;
            const dateParts = parts[0].split('/');
            if(dateParts.length === 3) {
                let d = parseInt(dateParts[0], 10);
                let m = parseInt(dateParts[1], 10) - 1;
                let y = parseInt(dateParts[2], 10);
                if (y > 2500) y -= 543;
                return new Date(y, m, d);
            }
            const fallback = new Date(dtStr);
            return isNaN(fallback.getTime()) ? null : fallback;
        };

        const hexToRgbA = (hex, alpha) => {
            if (!hex || !hex.startsWith('#')) return hex;
            let c = hex.substring(1).split('');
            if (c.length === 3) c = [c[0], c[0], c[1], c[1], c[2], c[2]];
            if (c.length !== 6) return hex;
            let r = parseInt(c.slice(0, 2).join(''), 16);
            let g = parseInt(c.slice(2, 4).join(''), 16);
            let b = parseInt(c.slice(4, 6).join(''), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        };

        const getDaysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
        const getFirstDayOfMonth = (y, m) => new Date(y, m, 1).getDay();

        // ==========================================
        // Default Master Data (Fallback)
        // ==========================================
        const defaultMasterData = {
            equipTeams: ["Team A", "Team B", "Team C", "Team D"],
            fiberTeams: ["Fiber X", "Fiber Y", "Fiber Z"],
            configTeams: ["Config 1", "Config 2"],
            pmTeams: ["PM John", "PM Jane", "PM Peter"],
            scopeOfWorks: [
                "Install New", "Remove", "Migration", "Preventive Maintenance", "กำหนดเวลาเอง (Custom)", "อื่นๆ (Other)"
            ],
            statuses: [
                {name: "รอรับงาน", bg: "#f59e0b", text: "#b45309"}, 
                {name: "กำลังดำเนินการ", bg: "#3b82f6", text: "#1e3a8a"}, 
                {name: "สำเร็จ", bg: "#10b981", text: "#065f46"}, 
                {name: "ยกเลิก", bg: "#ef4444", text: "#991b1b"} 
            ]
        };

        const getScopeDuration = (scopeName) => {
            const s = (scopeName || '').toLowerCase();
            if (s.includes('install')) return 120;
            if (s.includes('remove')) return 60;
            if (s.includes('migration')) return 180;
            if (s.includes('preventive')) return 90;
            return 60; 
        };

        // ==========================================
        // UI Components
        // ==========================================
        const MultiSelect = ({ options = [], selected = [], onChange, placeholder = "ทั้งหมด" }) => {
            const [isOpen, setIsOpen] = useState(false);
            const dropdownRef = useRef(null);
            useEffect(() => {
                const handleClickOutside = (event) => { if (dropdownRef.current && !dropdownRef.current.contains(event.target)) setIsOpen(false); };
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);
            const toggleOption = (opt) => { if (selected.includes(opt)) onChange(selected.filter(x => x !== opt)); else onChange([...selected, opt]); };
            return (
                <div className="relative inline-block text-left w-full h-auto" ref={dropdownRef}>
                    <button type="button" onClick={() => setIsOpen(!isOpen)} className="border border-slate-300 rounded-lg px-3 py-1.5 text-xs md:text-sm bg-white flex items-center justify-between w-full shadow-sm hover:bg-slate-50 transition-colors h-[38px] min-w-[150px]">
                        <span className="truncate pr-2 text-slate-700 font-medium">{selected?.length === 0 ? placeholder : `เลือกแล้ว ${selected?.length || 0} รายการ`}</span>
                        <i className={`fa-solid fa-chevron-down text-[10px] md:text-xs text-slate-400 transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`}></i>
                    </button>
                    {isOpen && (
                        <div className="absolute left-0 mt-2 w-full min-w-[200px] rounded-xl shadow-xl bg-white ring-1 ring-black ring-opacity-5 z-[5000] overflow-hidden">
                            <div className="max-h-[50vh] sm:max-h-60 overflow-y-auto py-2 custom-scrollbar">
                                {options?.map(opt => (
                                    <label key={opt} className="flex items-center px-4 py-2 hover:bg-blue-50 cursor-pointer transition-colors">
                                        <input type="checkbox" checked={selected?.includes(opt)} onChange={() => toggleOption(opt)} className="mr-3 rounded border-slate-300 text-blue-600 focus:ring-blue-500 w-4 h-4 cursor-pointer" />
                                        <span className="text-sm text-slate-600 truncate" title={opt}>{opt}</span>
                                    </label>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const ChartComponent = ({ type, data, options }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);
            useEffect(() => {
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, { type, data, options });
                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [type, data, options]);
            return <canvas ref={chartRef} style={{ width: '100%', height: '100%' }} />;
        };

        const FormModal = ({ isOpen, onClose, title, iconClass, colorTheme, children }) => {
            if (!isOpen) return null;
            const themeMap = {
                blue: { text: 'text-blue-800', icon: 'text-blue-600', border: 'border-blue-100', bg: 'bg-blue-50' },
                amber: { text: 'text-amber-800', icon: 'text-amber-600', border: 'border-amber-100', bg: 'bg-amber-50' },
                emerald: { text: 'text-emerald-800', icon: 'text-emerald-600', border: 'border-emerald-100', bg: 'bg-emerald-50' },
            };
            const theme = themeMap[colorTheme] || themeMap.blue;

            return (
                <div className="fixed inset-0 z-[5000] flex items-center justify-center p-4 sm:p-6 bg-slate-900/60 backdrop-blur-sm transition-opacity">
                    <div className="modal-animate bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[95vh] flex flex-col overflow-hidden">
                        <div className={`px-5 py-4 border-b border-slate-200 flex justify-between items-center ${theme.bg} shrink-0`}>
                            <h2 className={`text-lg font-bold flex items-center ${theme.text}`}>
                                <i className={`${iconClass} ${theme.icon} mr-3 text-xl`}></i> {title}
                            </h2>
                            <button onClick={onClose} className="w-8 h-8 flex justify-center items-center rounded-full bg-white hover:bg-slate-200 text-slate-500 shadow-sm border transition-colors">
                                <i className="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar bg-slate-50/50">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // Sub-Components
        // ==========================================
        const MasterDataView = ({ masterData }) => {
            const { setDoc, doc } = window.FirebaseLib;

            // Update Firebase directly
            const updateDataInFirebase = async (key, val) => {
                const newData = { ...masterData, [key]: val };
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'masterData'), newData);
                } catch (e) { console.error("Error updating master data:", e); window.customAlert("เกิดข้อผิดพลาดในการบันทึกข้อมูล"); }
            };

            const SimpleListEditor = ({ title, dataKey, placeholder, icon }) => {
                const [input, setInput] = useState('');
                const list = masterData[dataKey] || [];
                const add = () => { if(!input.trim()) return; updateDataInFirebase(dataKey, [...list, input.trim()]); setInput(''); };
                const remove = (idx) => {
                    if(window.customConfirm) { window.customConfirm('ยืนยันลบข้อมูลนี้?', () => updateDataInFirebase(dataKey, list.filter((_, i) => i !== idx))); } 
                    else updateDataInFirebase(dataKey, list.filter((_, i) => i !== idx));
                };

                return (
                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col h-full">
                        <h3 className="font-bold text-slate-800 mb-3 flex items-center"><i className={`${icon} text-blue-600 mr-2`}></i>{title}</h3>
                        <div className="flex gap-2 mb-3">
                            <input type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} placeholder={placeholder} className="flex-1 border border-slate-300 rounded-lg px-3 py-1.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" />
                            <button onClick={add} className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-blue-700 transition-colors"><i className="fa-solid fa-plus"></i></button>
                        </div>
                        <ul className="space-y-2 flex-1 overflow-y-auto custom-scrollbar pr-1 max-h-48 min-h-[120px]">
                            {list.length === 0 && <li className="text-xs text-center text-slate-400 py-4">ไม่มีข้อมูล</li>}
                            {list.map((item, idx) => (
                                <li key={idx} className="flex justify-between items-center bg-slate-50 px-3 py-2 rounded-lg border border-slate-100 text-sm group hover:border-slate-200 transition-colors">
                                    <span className="text-slate-700 font-medium truncate pr-2">{item}</span>
                                    <button onClick={()=>remove(idx)} className="text-slate-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100"><i className="fa-solid fa-trash-can"></i></button>
                                </li>
                            ))}
                        </ul>
                    </div>
                );
            };

            const StatusEditor = () => {
                const list = masterData.statuses || [];
                const add = () => updateDataInFirebase('statuses', [...list, {name: 'สถานะใหม่', bg: '#e2e8f0', text: '#475569'}]);
                const update = (idx, field, val) => { const newList = [...list]; newList[idx][field] = val; updateDataInFirebase('statuses', newList); };
                const remove = (idx) => {
                    if(window.customConfirm) window.customConfirm('ยืนยันลบสถานะนี้?', () => updateDataInFirebase('statuses', list.filter((_, i) => i !== idx))); 
                    else updateDataInFirebase('statuses', list.filter((_, i) => i !== idx));
                };

                return (
                    <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm md:col-span-2 flex flex-col h-full">
                        <div className="flex justify-between items-center mb-3 border-b pb-2">
                            <h3 className="font-bold text-slate-800 flex items-center"><i className="fa-solid fa-tags text-blue-600 mr-2"></i> ตั้งค่าสถานะงานและสี</h3>
                            <button onClick={add} className="text-xs bg-blue-50 text-blue-700 hover:bg-blue-100 px-3 py-1.5 rounded-lg font-bold border border-blue-200 transition-colors"><i className="fa-solid fa-plus"></i> เพิ่มสถานะ</button>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 flex-1 overflow-y-auto custom-scrollbar pr-1 max-h-[300px]">
                            {list.length === 0 && <div className="col-span-1 sm:col-span-2 text-center text-xs text-slate-400 py-4">ไม่มีสถานะ</div>}
                            {list.map((st, idx) => (
                                <div key={idx} className="flex flex-col gap-2 p-3 bg-slate-50 border border-slate-200 rounded-lg relative group hover:border-blue-200 transition-colors">
                                    <div className="flex gap-2 items-center">
                                        <input type="text" value={st.name} onChange={e=>update(idx, 'name', e.target.value)} placeholder="ชื่อสถานะ" className="flex-1 border border-slate-300 rounded px-2 py-1 text-sm outline-none focus:border-blue-500 font-bold text-slate-700" />
                                        <button onClick={()=>remove(idx)} className="text-slate-300 hover:text-red-500 px-1 transition-colors"><i className="fa-solid fa-trash-can"></i></button>
                                    </div>
                                    <div className="flex gap-3 items-center justify-between mt-1">
                                        <div className="flex gap-3">
                                            <div className="flex items-center gap-1.5 bg-white px-2 py-1 border rounded-md"><span className="text-[10px] text-slate-500 font-bold">พื้นหลัง</span><input type="color" value={st.bg} onChange={e=>update(idx, 'bg', e.target.value)} className="w-5 h-5 p-0 border-0 cursor-pointer rounded" /></div>
                                            <div className="flex items-center gap-1.5 bg-white px-2 py-1 border rounded-md"><span className="text-[10px] text-slate-500 font-bold">ตัวอักษร</span><input type="color" value={st.text} onChange={e=>update(idx, 'text', e.target.value)} className="w-5 h-5 p-0 border-0 cursor-pointer rounded" /></div>
                                        </div>
                                        <div className="ml-auto"><span className="text-xs px-2 py-1 rounded-md border font-bold" style={{backgroundColor: hexToRgbA(st.bg, 0.2), color: st.text, borderColor: st.bg}}>{st.name || 'ตัวอย่าง'}</span></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <SimpleListEditor title="Region Responsible" dataKey="equipTeams" placeholder="เพิ่มทีม Region..." icon="fa-solid fa-users" />
                    <SimpleListEditor title="Fiber Responsible" dataKey="fiberTeams" placeholder="เพิ่มทีม Fiber..." icon="fa-solid fa-network-wired" />
                    <SimpleListEditor title="Config Responsible" dataKey="configTeams" placeholder="เพิ่มทีม Config..." icon="fa-solid fa-laptop-code" />
                    <SimpleListEditor title="ทีมงาน PM" dataKey="pmTeams" placeholder="เพิ่ม PM..." icon="fa-solid fa-user-tie" />
                    <SimpleListEditor title="ลักษณะงาน (Scope)" dataKey="scopeOfWorks" placeholder="เพิ่ม Scope..." icon="fa-solid fa-list-check" />
                    <StatusEditor />
                </div>
            );
        };

        const AssignSys1Form = ({ tasksSys1, masterData, onClose, isModal = false }) => {
            const { setDoc, doc } = window.FirebaseLib;
            
            const [form, setForm] = useState({
                dateTime: new Date().toLocaleString('th-TH', { hour12: false }),
                installDate: '',
                startTime: '09:00',
                endTime: '10:00',
                helperEndTime: '10:00',
                equipTeams: [], equipTeamsSub: [], 
                fiberTeams: [], configTeam: '', pmTeam: '',
                cid: '', customerName: '', scopeOfWork: '', otherScopeDetail: '',
                customerContact: '', location: '', 
                status: 'รอรับงาน', remark: ''
            });

            const isCustomScope = (scopeName) => {
                const s = scopeName || '';
                return s.includes('กำหนดเวลาเอง') || s.includes('Custom') || s.includes('อื่นๆ');
            };

            const disableEndTimeField = !isCustomScope(form.scopeOfWork) && form.scopeOfWork !== '';

            const handleScopeChange = (scopeName) => {
                if (!isCustomScope(scopeName) && scopeName !== '') {
                    const duration = getScopeDuration(scopeName);
                    if (form.startTime) {
                        const [h, m] = form.startTime.split(':').map(Number);
                        const date = new Date();
                        date.setHours(h, m + duration);
                        const newEndTime = `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
                        setForm({ ...form, scopeOfWork: scopeName, endTime: newEndTime });
                    } else {
                        setForm({ ...form, scopeOfWork: scopeName });
                    }
                } else {
                    setForm({ ...form, scopeOfWork: scopeName });
                }
            };

            const handleStartTimeChange = (time) => {
                const [h, m] = time.split(':').map(Number);
                
                const hDate = new Date();
                hDate.setHours(h, m + 60);
                const newHelperEndTime = `${String(hDate.getHours()).padStart(2, '0')}:${String(hDate.getMinutes()).padStart(2, '0')}`;

                if (!isCustomScope(form.scopeOfWork) && form.scopeOfWork !== '') {
                    const duration = getScopeDuration(form.scopeOfWork);
                    const date = new Date();
                    date.setHours(h, m + duration);
                    const newEndTime = `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
                    setForm({ ...form, startTime: time, endTime: newEndTime, helperEndTime: newHelperEndTime });
                } else {
                    setForm({ ...form, startTime: time, helperEndTime: newHelperEndTime });
                }
            };

            const timeToMin = (t) => {
                if(!t) return 0;
                const [h, m] = t.split(':').map(Number);
                return h * 60 + m;
            };

            const handleSubmit = async () => {
                if(!form.scopeOfWork) return window.customAlert('กรุณาเลือก Scope of Work');
                if(form.scopeOfWork === 'อื่นๆ (Other)' && !form.otherScopeDetail.trim()) return window.customAlert('กรุณาระบุรายละเอียดสำหรับ Scope งาน "อื่นๆ"');
                if(!form.cid || !form.installDate || !form.startTime || !form.endTime) return window.customAlert('กรุณากรอกข้อมูลสำคัญให้ครบ (CID, วันที่ และเวลาติดตั้ง)');

                const newStartMin = timeToMin(form.startTime);
                const newEndMin = timeToMin(form.endTime);
                const newHelperEndMin = timeToMin(form.helperEndTime);

                if (newStartMin >= newEndMin) return window.customAlert('❌ เวลาสิ้นสุดงานต้องมากกว่าเวลาเริ่มงาน');
                if (newStartMin >= newHelperEndMin) return window.customAlert('❌ เวลาสิ้นสุด(ผู้ช่วย) ต้องมากกว่าเวลาเริ่มงาน');

                const allNewPrimaryEquip = [...form.equipTeams];
                const allNewSecondaryEquip = [...form.equipTeamsSub];

                let conflictDetails = null;

                for (let task of tasksSys1) {
                    if (task.installDate !== form.installDate) continue;
                    if (!task.startTime || !task.endTime) continue;

                    const tStart = timeToMin(task.startTime);
                    const tEnd = timeToMin(task.endTime);
                    const tHelperEnd = task.helperEndTime ? timeToMin(task.helperEndTime) : tEnd;

                    const tStartWithGap = tStart - 60;

                    const taskPrimaryEquip = [...(task.equipTeams || [])];
                    const taskSecondaryEquip = [...(task.equipTeamsSub || [])];

                    for (let team of allNewPrimaryEquip) {
                        const isTaskPrimary = taskPrimaryEquip.includes(team);
                        const isTaskSecondary = taskSecondaryEquip.includes(team);
                        if (!isTaskPrimary && !isTaskSecondary) continue;

                        const checkTaskEnd = isTaskPrimary ? tEnd : tHelperEnd;
                        const checkTaskEndWithGap = checkTaskEnd + 60;

                        if ((newStartMin < checkTaskEndWithGap) && (newEndMin > tStartWithGap)) {
                            conflictDetails = { task, team, role: 'Main', conflictWith: isTaskPrimary ? 'Main' : 'Sub' };
                            break;
                        }
                    }
                    if (conflictDetails) break;

                    for (let team of allNewSecondaryEquip) {
                        const isTaskPrimary = taskPrimaryEquip.includes(team);
                        const isTaskSecondary = taskSecondaryEquip.includes(team);
                        if (!isTaskPrimary && !isTaskSecondary) continue;

                        const checkTaskEnd = isTaskPrimary ? tEnd : tHelperEnd;
                        const checkTaskEndWithGap = checkTaskEnd + 60;

                        if ((newStartMin < checkTaskEndWithGap) && (newHelperEndMin > tStartWithGap)) {
                            conflictDetails = { task, team, role: 'Sub', conflictWith: isTaskPrimary ? 'Main' : 'Sub' };
                            break;
                        }
                    }
                    if (conflictDetails) break;
                }

                if (conflictDetails) {
                    const conflictEndTime = conflictDetails.conflictWith === 'Main' ? conflictDetails.task.endTime : (conflictDetails.task.helperEndTime || conflictDetails.task.endTime);
                    return window.customAlert(`❌ ไม่สามารถมอบหมายงานได้!\n\nทีม [${conflictDetails.team}] (ในตำแหน่ง ${conflictDetails.role}) ติดงานอื่น หรืออยู่ในช่วงเวลาเดินทาง (เว้น 1 ชั่วโมง)\n\nลูกค้ารายที่ติดงาน: ${conflictDetails.task.customerName || conflictDetails.task.cid}\nเวลาทำงาน: ${conflictDetails.task.startTime} - ${conflictEndTime}`);
                }

                    if(onClose) onClose();

        const DataTable = ({ title, columns, data, masterData, onAddClick, addLabel = "เพิ่มข้อมูล", btnClass = "bg-blue-600 hover:bg-blue-700", onUpdateTask }) => {
            const [sortConfig, setSortConfig] = useState({ key: null, direction: null });

            const processedData = useMemo(() => {
                let items = [...data];
                
                if (searchTerm) {
                    const lowerSearch = searchTerm.toLowerCase();
                    items = items.filter(item => Object.values(item).some(val => {

                        return String(val || '').toLowerCase().includes(lowerSearch);
                    }));
                }

                if (filters.scopeOfWork) items = items.filter(i => {
                    let s = i.scopeOfWork === 'อื่นๆ (Other)' && i.otherScopeDetail ? `อื่นๆ: ${i.otherScopeDetail}` : i.scopeOfWork;
                    if(filters.scopeOfWork === 'อื่นๆ (Other)') return i.scopeOfWork === 'อื่นๆ (Other)';

                });
                if (filters.configTeam) items = items.filter(i => i.configTeam === filters.configTeam);
                if (filters.pmTeam) items = items.filter(i => i.pmTeam === filters.pmTeam);
                if (filters.status) items = items.filter(i => i.status === filters.status);
                
                if (filters.equipTeams) {
                    items = items.filter(i => {
                        const m = Array.isArray(i.equipTeams) ? i.equipTeams : [];
                        const s = Array.isArray(i.equipTeamsSub) ? i.equipTeamsSub : [];
                        return m.includes(filters.equipTeams) || s.includes(filters.equipTeams);
                    });
                }
                if (filters.fiberTeams) {
                    items = items.filter(i => Array.isArray(i.fiberTeams) ? i.fiberTeams.includes(filters.fiberTeams) : i.fiberTeams === filters.fiberTeams);
                }

                if (sortConfig.key !== null) {
                    items.sort((a, b) => {
                        let aVal = a[sortConfig.key];
                        let bVal = b[sortConfig.key];
                        
                        if (sortConfig.key === 'timeRange') {
                            aVal = a.startTime && a.endTime ? `${a.startTime} - ${a.endTime}` : '';
                            bVal = b.startTime && b.endTime ? `${b.startTime} - ${b.endTime}` : '';
                        } else if (sortConfig.key === 'scopeOfWork') {
                            aVal = a.scopeOfWork === 'อื่นๆ (Other)' && a.otherScopeDetail ? `อื่นๆ: ${a.otherScopeDetail}` : a.scopeOfWork;
                            bVal = b.scopeOfWork === 'อื่นๆ (Other)' && b.otherScopeDetail ? `อื่นๆ: ${b.otherScopeDetail}` : b.scopeOfWork;
                        } else {
                            if (Array.isArray(aVal)) aVal = aVal.join(', ');
                            if (Array.isArray(bVal)) bVal = bVal.join(', ');
                        }

                        aVal = String(aVal || '');
                        bVal = String(bVal || '');
                        return sortConfig.direction === 'asc' ? aVal.localeCompare(bVal, 'th', { numeric: true }) : bVal.localeCompare(aVal, 'th', { numeric: true });
                    });
                }
                return items;
            }, [data, sortConfig, searchTerm, filters]);

            const requestSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const orderedColumns = useMemo(() => {
                const pinned = columns.filter(c => pinnedColumns.includes(c.key));
                const unpinned = columns.filter(c => !pinnedColumns.includes(c.key));
                return [...pinned, ...unpinned];
            }, [columns, pinnedColumns]);

            const handlePinToggle = (e, key) => {
                e.stopPropagation();
                setPinnedColumns(prev => prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]);
                if (!colWidths[key]) {
                    const th = e.currentTarget.closest('th');
                    if (th) setColWidths(prev => ({ ...prev, [key]: Math.max(120, th.getBoundingClientRect().width) }));
                }
            };

            const getColWidth = (key) => colWidths[key] || 150;
            const getPinnedLeftPos = (key) => {
                let left = 0;
                const targetIdx = orderedColumns.findIndex(c => c.key === key);
                for (let i = 0; i < targetIdx; i++) {
                    if (pinnedColumns.includes(orderedColumns[i].key)) left += getColWidth(orderedColumns[i].key);
                }
                return left;
            };

            const handlePointerDown = (e, key) => {
                e.preventDefault(); e.stopPropagation();
                const startX = e.pageX || (e.touches ? e.touches[0].pageX : 0);
                const th = e.currentTarget.closest('th');
                const startWidth = th ? th.getBoundingClientRect().width : 150;

                const onPointerMove = (me) => {
                    const currentX = me.pageX || (me.touches ? me.touches[0].pageX : 0);
                    setColWidths(prev => ({ ...prev, [key]: Math.max(60, startWidth + (currentX - startX)) }));
                };
                const onPointerUp = () => {
                    document.removeEventListener('pointermove', onPointerMove);
                    document.removeEventListener('pointerup', onPointerUp);
                    document.removeEventListener('touchmove', onPointerMove);
                    document.removeEventListener('touchend', onPointerUp);
                };

                document.addEventListener('pointermove', onPointerMove);
                document.addEventListener('pointerup', onPointerUp);
                document.addEventListener('touchmove', onPointerMove, { passive: false });
                document.addEventListener('touchmove', onPointerMove, { passive: false });
                document.addEventListener('touchend', onPointerUp);
            };

            const resetFilters = () => {
                setSearchTerm('');
                setFilters({ scopeOfWork: '', equipTeams: '', fiberTeams: '', configTeam: '', pmTeam: '', status: '' });
                setSortConfig({ key: null, direction: null });
            };

            return (
                <div className="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 flex flex-col min-h-0 overflow-hidden relative">
                    <div className="p-4 border-b border-slate-200 bg-slate-50 flex flex-col gap-3">
                        <div className="flex justify-between items-center">
                            <h2 className="text-lg font-bold text-slate-800">{title}</h2>
                            <div className="flex items-center gap-3">
                                <span className="text-sm font-semibold text-blue-600 bg-blue-100 px-3 py-1 rounded-full">{processedData.length} รายการ</span>
                                {onAddClick && (
                                    <button onClick={onAddClick} className={`${btnClass} text-white px-4 py-1.5 rounded-lg text-sm font-bold shadow-sm transition-transform active:scale-95 flex items-center gap-2`}>
                                        <i className="fa-solid fa-plus"></i> <span className="hidden sm:inline">{addLabel}</span>
                                    </button>
                                )}
                            </div>
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-2 bg-white p-2 border border-slate-200 rounded-xl shadow-sm">
                            <div className="relative flex-1 min-w-[200px]">
                                <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                <input type="text" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} placeholder="ค้นหาข้อมูลในตาราง..." className="w-full bg-slate-50 border border-slate-300 rounded-lg pl-9 pr-3 py-1.5 text-xs outline-none focus:ring-1 focus:ring-blue-500" />
                            </div>
                            
                            {columns.some(c => c.key === 'scopeOfWork') && (
                                <select value={filters.scopeOfWork} onChange={e=>setFilters({...filters, scopeOfWork: e.target.value})} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs outline-none bg-slate-50 text-slate-700">
                                    <option value="">-- Scope --</option>
                                    {masterData.scopeOfWorks.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            )}
                            {columns.some(c => c.key === 'equipTeams') && (
                                <select value={filters.equipTeams} onChange={e=>setFilters({...filters, equipTeams: e.target.value})} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs outline-none bg-slate-50 text-slate-700">
                                    <option value="">-- Region Responsible --</option>
                                    {masterData.equipTeams.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            )}
                            {columns.some(c => c.key === 'fiberTeams') && (
                                <select value={filters.fiberTeams} onChange={e=>setFilters({...filters, fiberTeams: e.target.value})} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs outline-none bg-slate-50 text-slate-700">
                                    <option value="">-- Fiber Responsible --</option>
                                    {masterData.fiberTeams.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            )}
                            {columns.some(c => c.key === 'configTeam') && (
                                <select value={filters.configTeam} onChange={e=>setFilters({...filters, configTeam: e.target.value})} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs outline-none bg-slate-50 text-slate-700">
                                    <option value="">-- Config Responsible --</option>
                                    {masterData.configTeams.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            )}
                            {columns.some(c => c.key === 'pmTeam') && (
                                <select value={filters.pmTeam} onChange={e=>setFilters({...filters, pmTeam: e.target.value})} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs outline-none bg-slate-50 text-slate-700">
                                    <option value="">-- PM --</option>
                                    {masterData.pmTeams.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                            )}
                            {columns.some(c => c.key === 'status') && (
                                <select value={filters.status} onChange={e=>setFilters({...filters, status: e.target.value})} className="border border-slate-300 rounded-lg px-2 py-1.5 text-xs outline-none bg-slate-50 text-slate-700">
                                    <option value="">-- Status --</option>
                                    {masterData.statuses.map(s => <option key={s.name} value={s.name}>{s.name}</option>)}
                                </select>
                            )}
                            <button onClick={resetFilters} className="text-[10px] bg-red-50 text-red-600 border border-red-200 hover:bg-red-500 hover:text-white px-2 py-1.5 rounded-lg transition-colors"><i className="fa-solid fa-eraser mr-1"></i>ล้าง</button>
                        </div>
                    </div>

                    <div className="flex-1 overflow-auto table-container relative">
                        <table className="w-full text-left border-collapse text-sm relative" style={{ tableLayout: 'fixed', minWidth: 'max-content' }}>
                            <thead className="bg-slate-800 shadow-sm sticky top-0 z-40">
                                <tr>
                                    {orderedColumns.map((col) => {
                                        const isPinned = pinnedColumns.includes(col.key);
                                        const isLastPinned = isPinned && col.key === pinnedColumns[pinnedColumns.length - 1];
                                        const colWidth = getColWidth(col.key);

                                        let thStyle = { width: colWidth, minWidth: colWidth, maxWidth: colWidth };
                                        if (isPinned) {
                                            thStyle.position = 'sticky';
                                            thStyle.left = getPinnedLeftPos(col.key);
                                            thStyle.zIndex = 50;
                                        }

                                        let thClass = `p-0 align-middle relative group transition-colors select-none sortable-header bg-slate-800 border-r border-slate-700 hover:bg-slate-700`;
                                        if (isLastPinned) thClass += ` shadow-[4px_0_6px_-1px_rgba(0,0,0,0.3)] border-r-slate-500`;

                                        return (
                                            <th key={col.key} className={thClass} style={thStyle}>
                                                <div className="flex items-center justify-between px-3 py-3 w-full h-full cursor-pointer" onClick={() => requestSort(col.key)}>
                                                    <div className="flex items-center gap-2 overflow-hidden w-full">
                                                        <div className="th-content text-xs font-semibold text-white truncate">{col.label}</div>
                                                        <button onClick={(e) => handlePinToggle(e, col.key)} className={`shrink-0 hover:scale-125 transition-transform ${isPinned ? 'text-blue-400' : 'text-slate-500 hover:text-white'}`} title="ตรึงคอลัมน์">
                                                            <i className="fa-solid fa-thumbtack text-[10px]"></i>
                                                        </button>
                                                    </div>
                                                    <div className="ml-1 text-white opacity-70 shrink-0 text-[10px]">
                                                        {sortConfig.key === col.key ? (sortConfig.direction === 'asc' ? <i className="fa-solid fa-sort-up text-blue-400"></i> : <i className="fa-solid fa-sort-down text-blue-400"></i>) : <i className="fa-solid fa-sort opacity-30"></i>}
                                                    </div>
                                                </div>
                                                <div onPointerDown={(e) => handlePointerDown(e, col.key)} onClick={(e) => e.stopPropagation()} className="absolute right-0 top-0 bottom-0 w-4 cursor-col-resize z-10 hover:bg-blue-500 flex flex-col justify-center items-center transition-colors opacity-0 group-hover:opacity-100">
                                                    <div className="w-[2px] h-4 bg-white/60 rounded-full pointer-events-none"></div>
                                                </div>
                                            </th>
                                        );
                                    })}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-200">
                                {processedData.length === 0 ? (
                                    <tr><td colSpan={columns.length} className="p-8 text-center text-slate-500">ไม่มีข้อมูลที่ตรงกับการค้นหา</td></tr>
                                ) : (
                                    processedData.map((row, rIdx) => (
                                        <tr key={row.id} className="hover:bg-blue-50/50 transition-colors bg-white">
                                            {orderedColumns.map((col, cIdx) => {
                                                const isPinned = pinnedColumns.includes(col.key);
                                                const isLastPinned = isPinned && col.key === pinnedColumns[pinnedColumns.length - 1];
                                                const colWidth = getColWidth(col.key);

                                                let tdStyle = { width: colWidth, minWidth: colWidth, maxWidth: colWidth, verticalAlign: 'middle' };
                                                if (isPinned) {
                                                    tdStyle.position = 'sticky';
                                                    tdStyle.left = getPinnedLeftPos(col.key);
                                                    tdStyle.zIndex = 20;
                                                }

                                                let tdClass = `px-3 py-2 align-middle border-r border-slate-100 truncate`;
                                                if (isPinned) {
                                                    tdClass += ` sticky-col-cell bg-white group-hover:bg-blue-50/50`;
                                                    if (isLastPinned) tdClass += ` shadow-[4px_0_6px_-1px_rgba(0,0,0,0.1)] border-r-slate-300`;
                                                }

                                                const val = row[col.key];
                                                let displayVal = val || '-';
                                                
                                                if (col.key === 'timeRange') {
                                                    displayVal = row.startTime && row.endTime ? `${row.startTime} - ${row.endTime}` : '-';
                                                } else if (col.key === 'scopeOfWork' && val === 'อื่นๆ (Other)' && row.otherScopeDetail) {
                                                    displayVal = `อื่นๆ: ${row.otherScopeDetail}`;
                                                } else if (col.key === 'equipTeams') {
                                                    const main = row.equipTeams || [];
                                                    const sub = row.equipTeamsSub || [];
                                                    const parts = [];
                                                    if (main.length) parts.push(`Main: ${main.join(', ')}`);
                                                    if (sub.length) parts.push(`Sub: ${sub.join(', ')}`);
                                                    displayVal = parts.length > 0 ? parts.join(' | ') : '-';
                                                } else if (col.key === 'fiberTeams') {
                                                    const main = row.fiberTeams || [];
                                                    displayVal = main.length > 0 ? main.join(', ') : '-';
                                                } else if (Array.isArray(val)) {
                                                    displayVal = val.join(', ');
                                                }

                                                // --- 1. Inline Select (Dropdown) ---
                                                const isDropdownCol = ['status', 'configTeam', 'pmTeam', 'scopeOfWork'].includes(col.key);
                                                if (isDropdownCol) {
                                                    let options = [];
                                                    if (col.key === 'status') options = masterData.statuses.map(s => s.name);
                                                    else if (col.key === 'configTeam') options = masterData.configTeams;
                                                    else if (col.key === 'pmTeam') options = masterData.pmTeams;
                                                    else if (col.key === 'scopeOfWork') options = masterData.scopeOfWorks;

                                                    return (
                                                        <td key={cIdx} className={`${tdClass} text-center relative group`} style={tdStyle} title={displayVal}>
                                                            <div className="relative w-full h-full flex items-center justify-center cursor-pointer min-h-[24px]">
                                                                {col.key === 'status' ? (
                                                                    <span className="px-2 py-1 rounded-md text-[10px] md:text-xs font-bold border block truncate w-full group-hover:opacity-80 transition-opacity" style={{ backgroundColor: getStatusColor(val).bg, color: getStatusColor(val).text, borderColor: getStatusColor(val).border }}>
                                                                        {displayVal}
                                                                    </span>
                                                                ) : (
                                                                    <span className="truncate w-full text-xs md:text-sm text-blue-600 font-semibold group-hover:underline flex items-center gap-1 justify-center">
                                                                        {displayVal} <i className="fa-solid fa-pen text-[8px] opacity-0 group-hover:opacity-100 transition-opacity"></i>
                                                                    </span>
                                                                )}
                                                                <select 
                                                                    className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                                                    value={Array.isArray(val) ? val[0] || '' : val || ''}
                                                                    onChange={(e) => {
                                                                        if(onUpdateTask) onUpdateTask(row.id, col.key, e.target.value);
                                                                    }}
                                                                >
                                                                    <option value="" disabled>เลือก...</option>
                                                                    {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                                                </select>
                                                            </div>
                                                        </td>
                                                    );
                                                }

                                                // --- 2. Readonly Cols ---
                                                const isReadonly = ['dateTime', 'equipTeams', 'fiberTeams'].includes(col.key);
                                                if (isReadonly) {
                                                    return (
                                                        <td key={cIdx} className={tdClass} style={tdStyle} title={displayVal}>
                                                            <div className={`truncate w-full text-xs md:text-sm text-slate-600 ${col.key === 'dateTime' ? 'cursor-not-allowed' : ''}`}>{displayVal}</div>
                                                        </td>
                                                    )
                                                }

                                                // --- 3. Inline Text Edit (Double Click) ---
                                                const cellId = `${row.id}-${col.key}`;
                                                const isEditing = editingCell === cellId;

                                                let inputType = "text";
                                                let editValue = displayVal === '-' ? '' : displayVal;
                                                let updateKey = col.key;

                                                if (col.key === 'installDate' || col.key === 'date') {
                                                    inputType = "date";
                                                    editValue = row[col.key] || '';
                                                } else if (col.key === 'timeRange') {
                                                    inputType = "time";
                                                    editValue = row.startTime || '';
                                                    updateKey = 'startTime';
                                                }

                                                return (
                                                    <td key={cIdx} className={tdClass} style={tdStyle} title={isEditing ? '' : displayVal}>
                                                        {isEditing ? (
                                                            <input 
                                                                type={inputType}
                                                                defaultValue={editValue}
                                                                className="w-full px-2 py-1 text-xs border border-blue-500 rounded outline-none shadow-inner"
                                                                autoFocus
                                                                onBlur={(e) => {
                                                                    if(onUpdateTask && e.target.value !== editValue) {
                                                                        onUpdateTask(row.id, updateKey, e.target.value);
                                                                    }
                                                                    setEditingCell(null);
                                                                }}
                                                                onKeyDown={(e) => {
                                                                    if(e.key === 'Enter') {
                                                                        if(onUpdateTask && e.target.value !== editValue) {
                                                                            onUpdateTask(row.id, updateKey, e.target.value);
                                                                        }
                                                                        setEditingCell(null);
                                                                    }
                                                                }}
                                                            />
                                                        ) : (
                                                            <div 
                                                                className="truncate w-full text-xs md:text-sm text-slate-700 cursor-text hover:bg-white hover:ring-1 hover:ring-blue-300 p-1 rounded transition-all group"
                                                                onDoubleClick={() => setEditingCell(cellId)}
                                                                title={col.key === 'timeRange' ? "ดับเบิ้ลคลิกเพื่อแก้ไขเวลาเริ่ม" : ""}
                                                            >
                                                                {displayVal}
                                                                <i className="fa-solid fa-pen text-[8px] text-blue-400 ml-2 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                                                            </div>
                                                        )}
                                                    </td>
                                                )
                                            })}
                                        </tr>
                                    ))
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const sys1Columns = [ 
            { label: 'Install Date', key: 'installDate' }, 
            { label: 'Time (Start-End)', key: 'timeRange' },
            { label: 'Region Responsible', key: 'equipTeams' }, 
            { label: 'Fiber Responsible', key: 'fiberTeams' }, 
            { label: 'Config Responsible', key: 'configTeam' }, 
            { label: 'CIDs', key: 'cid' }, 
            { label: 'Customer Name', key: 'customerName' }, 
            { label: 'Scope of Work', key: 'scopeOfWork' }, 
            { label: 'Remark', key: 'remark'},
            { label: 'Address', key: 'location' },
            { label: 'PM Responsible', key: 'pmTeam' }, 
            { label: 'Status', key: 'status' },
            { label: 'Last Update', key: 'dateTime' } 
        ];

        const sys2Columns = [ { label: 'Date', key: 'date' }, { label: 'Survey ID', key: 'surveyId' }, { label: 'Location', key: 'location' }, { label: 'Surveyor', key: 'surveyor' }, { label: 'Status', key: 'status' } ];
        const sys3Columns = [ { label: 'Order Date', key: 'date' }, { label: 'CID', key: 'cid' }, { label: 'From Port', key: 'fromPort' }, { label: 'To Port', key: 'toPort' }, { label: 'Status', key: 'status' } ];

        const MainDashboardView = ({ tasksSys1, tasksSys2, tasksSys3 }) => {
            const isStatusDone = (statusStr) => {
                if(!statusStr) return false;
                return !!statusStr.match(/(สำเร็จ|เรียบร้อย|complete|done)/i);
            };

            const calcStats = (tasks) => {
                const total = tasks.length;
                const done = tasks.filter(t => isStatusDone(t.status)).length;
                const pending = total - done;
                const percent = total === 0 ? 0 : Math.round((done / total) * 100);
                return { total, done, pending, percent };
            };

            const s1 = calcStats(tasksSys1);
            const s2 = calcStats(tasksSys2);
            const s3 = calcStats(tasksSys3);
            const overall = {
                total: s1.total + s2.total + s3.total,
                done: s1.done + s2.done + s3.done,
                pending: s1.pending + s2.pending + s3.pending,
            };
            overall.percent = overall.total === 0 ? 0 : Math.round((overall.done / overall.total) * 100);

            const SystemCard = ({ title, icon, colorClass, bgClass, stats }) => (
                <div className={`p-6 rounded-2xl border shadow-sm ${bgClass} flex flex-col`}>
                    <div className="flex items-center gap-3 mb-4">
                        <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-white ${colorClass} shadow-sm`}>
                            <i className={`fa-solid ${icon} text-xl`}></i>
                        </div>
                        <h3 className="text-base md:text-lg font-bold text-slate-800">{title}</h3>
                    </div>
                    <div className="grid grid-cols-2 gap-3 mb-4 flex-1">
                        <div className="bg-white p-3 rounded-xl border border-slate-100 shadow-sm flex flex-col items-center justify-center">
                            <span className="text-[10px] md:text-xs font-semibold text-slate-500 mb-1">งานทั้งหมด</span>
                            <span className="text-2xl font-bold text-slate-800">{stats.total}</span>
                        </div>
                        <div className="bg-emerald-50/50 p-3 rounded-xl border border-emerald-100 shadow-sm flex flex-col items-center justify-center">
                            <span className="text-[10px] md:text-xs font-semibold text-emerald-600 mb-1">สำเร็จแล้ว</span>
                            <span className="text-2xl font-bold text-emerald-600">{stats.done}</span>
                        </div>
                        <div className="bg-orange-50/50 p-3 rounded-xl border border-orange-100 shadow-sm col-span-2 flex flex-col items-center justify-center">
                            <span className="text-[10px] md:text-xs font-semibold text-orange-600 mb-1">กำลังดำเนินการ / ยังไม่เสร็จ</span>
                            <span className="text-2xl font-bold text-orange-600">{stats.pending}</span>
                        </div>
                    </div>
                    <div>
                        <div className="flex justify-between text-[10px] md:text-xs font-bold mb-1">
                            <span className="text-slate-500">ความคืบหน้า</span>
                            <span className={stats.percent === 100 ? 'text-emerald-600' : 'text-blue-600'}>{stats.percent}%</span>
                        </div>
                        <div className="w-full bg-white rounded-full h-2.5 shadow-inner overflow-hidden border border-slate-200">
                            <div className={`h-2.5 rounded-full ${stats.percent === 100 ? 'bg-emerald-500' : 'bg-blue-500'}`} style={{ width: `${stats.percent}%` }}></div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="space-y-6 max-w-7xl mx-auto w-full">
                    <header className="flex flex-col md:flex-row justify-between md:items-end gap-4 border-b border-slate-200 pb-4">
                        <div>
                            <h2 className="text-2xl md:text-3xl font-bold text-slate-900"><i className="fa-solid fa-house-chimney text-blue-600 mr-2"></i> ภาพรวมทุกระบบงาน (Main Dashboard)</h2>
                            <p className="text-sm text-slate-500 mt-1">สรุปจำนวนงานและสถานะความคืบหน้าเบื้องต้นของทุกระบบ</p>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div className="bg-slate-800 text-white p-5 md:p-6 rounded-2xl shadow-md border border-slate-700 flex items-center justify-between relative overflow-hidden">
                            <div className="relative z-10">
                                <p className="text-xs md:text-sm font-semibold text-slate-300 mb-1">รวมงานทั้งหมดในระบบ</p>
